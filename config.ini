# RoboRakshak Configuration File

## Application Settings
APP_HOST=0.0.0.0
APP_PORT=5000
DEBUG=False
LOG_LEVEL=INFO

## Motor Configuration
# GPIO Pin Numbers (BCM Mode)
LEFT_MOTOR_PIN1=5
LEFT_MOTOR_PIN2=6
RIGHT_MOTOR_PIN1=13
RIGHT_MOTOR_PIN2=19

# PWM Configuration
PWM_FREQUENCY=50
DEFAULT_SPEED=50
MAX_SPEED=100
MIN_SPEED=0

## Motor Behavior
# Control mode: pwm or switch
MOTOR_CONTROL_MODE=pwm

# Enable soft start (gradual acceleration)
SOFT_START=True
SOFT_START_DELAY=100

# Emergency stop timeout (ms)
EMERGENCY_TIMEOUT=5000

## Web UI Settings
UI_THEME=dark
UPDATES_PER_SECOND=2
STATUS_POLL_INTERVAL=2000

## Logging
LOG_FILE=/var/log/roborakshak/app.log
LOG_MAX_BYTES=10485760
LOG_BACKUP_COUNT=5

## Security
CHECK_GPIO_ACCESS=True
RESTRICTED_COMMANDS=False
API_TIMEOUT=30

## Camera Settings (for future use)
CAMERA_ENABLED=True
# Raspberry Pi Camera NoIR v2 is a CSI camera; use Picamera2/libcamera.
CAMERA_DRIVER=picamera2
# Use CAMERA_DEVICE=/dev/video0 for Linux/V4L2 device paths, or leave CAMERA_DEVICE_INDEX for numeric indexes.
CAMERA_DEVICE_INDEX=0
# CAMERA_DEVICE=/dev/video0
CAMERA_RESOLUTION=1920x1080
CAMERA_WARMUP_SECONDS=1.5
CAMERA_READ_ATTEMPTS=12
# Try DEFAULT first. Some cameras fail when MJPG is forced.
CAMERA_OPENCV_FOURCCS=DEFAULT,MJPG,YUYV
CAMERA_FPS=30
STREAM_QUALITY=high

## Motion Detection
# Detection runs while the live stream is active. Higher sensitivity (1-10)
# reacts to smaller pixel changes. Evidence snapshots are stored under
# frontend/static/captures and appear in the security event timeline.
MOTION_DETECTION_ENABLED=False
MOTION_SENSITIVITY=5
MOTION_MIN_AREA=500
MOTION_COOLDOWN_SEC=10
MOTION_PROCESS_INTERVAL_SEC=0.2
# Ignore camera movement while driving and briefly after the robot stops.
MOTION_STABILIZE_SEC=2
